<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 💡 브라우저의 탭 영역 제목을 설정함 -->
    <title>GG-SHORTS</title>
    <style>
        /* [전역 기본 레이아웃 구성 스타일링] */
        body { font-family: sans-serif; margin: 30px; background-color: #fcfcfc; }
        section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; background: white; }
        h2 { margin-top: 0; color: #333; }
        .flex { display: flex; gap: 20px; }
        input { margin-bottom: 5px; display: block; }
        button { cursor: pointer; }

        /* [화면 간 전환용 동적 디스플레이 스타일 정의] */
        .screen { display: none; }

        /* [로그인 인터페이스 컨테이너 레이아웃] */
        .login-outer {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .login-container {
            width: 400px;
            height: 310px; /* OP.GG 로고 수용을 위해 규격 확장함 */
            border: 1px solid #999;
            border-radius: 10px;
            padding: 40px;
            position: relative;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* OP.GG 특유의 강렬하고 정돈된 로고 스타일 장식 */
        .login-logo {
            text-align: center;
            font-size: 34px;
            font-weight: 900;
            color: #1f1f1f;
            margin-bottom: 5px;
            letter-spacing: 1px;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 35px;
            font-size: 15px;
            color: #666;
            font-weight: normal;
            letter-spacing: 0px;
        }
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .input-row label {
            width: 70px;
            font-weight: bold;
            font-size: 15px;
        }
        .input-row input {
            flex: 1;
            padding: 6px;
            border: 1px solid #aaa;
            border-radius: 3px;
            font-size: 14px;
        }
        .login-submit-btn {
            width: 80%;
            margin: 15px auto 0 auto;
            display: block;
            padding: 8px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        /* 우하단 신규 가입 전송을 위한 둥근 시그널 버튼 배치 */
        .signup-trigger-btn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            border: 1.5px solid #222;
            border-radius: 25px;
            padding: 8px 16px;
            background-color: white;
            font-size: 13px;
            font-weight: bold;
            color: #222;
            text-decoration: none;
            cursor: pointer;
            outline: none;
        }
        .signup-trigger-btn:hover {
            background-color: #eee;
        }

        /* [회원가입 레이아웃 스타일 설정] */
        .signup-container {
            width: 380px;
            margin: 100px auto;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 30px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .signup-container h2 {
            text-align: center;
            margin-bottom: 25px;
        }
        .signup-container input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .signup-btn {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .cancel-btn {
            width: 100%;
            padding: 10px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        /* [메인 로그인 성공 후 작업 상단 제어 바] */
        .auth-bar {
            background-color: #f0f0f0;
            padding: 12px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-panel {
            border: 1px dashed red;
            background-color: #fff9f9;
            padding: 15px;
            margin-top: 40px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<!-- ==================================================
     1. 로그인 화면 컨테이너 (Screen 1)
     ================================================== -->
<div id="loginScreen" class="screen">
    <div class="login-outer">
        <div class="login-container">
            <!-- OP.GG 스타일을 적용한 메인 로고 영역임 -->
            <div class="login-logo">GG-SHORTS</div>
            <h2>로그인</h2>

            <div class="input-row">
                <label for="loginName">아이디</label>
                <input id="loginName" type="text" placeholder="아이디 입력">
            </div>
            <div class="input-row">
                <label for="loginPassword">비번</label>
                <input id="loginPassword" type="password" placeholder="비밀번호 입력">
            </div>
            <button class="login-submit-btn" onclick="login()">로그인</button>

            <!-- 클릭 시 회원가입 패널로 시선을 이동시키는 변환 트리거임 -->
            <button class="signup-trigger-btn" onclick="goToSignup()">신규회원 가입!</button>
        </div>
    </div>

    <!-- 개발 프로세스를 보조하기 위한 비밀번호 힌트 제공 영역임 -->
    <div style="text-align: center; margin-top: -50px;">
        <span style="font-size: 12px; color: #888;">[디버그 도구] 비밀번호를 잊으셨나요? </span>
        <input id="hintName" placeholder="아이디 입력" style="display:inline-block; width:100px; padding:3px; font-size:12px;">
        <button onclick="getPasswordHint()" style="font-size:12px; padding:3px 6px;">힌트 보기</button>
    </div>
</div>

<!-- ==================================================
     2. 회원가입 화면 컨테이너 (Screen 2)
     ================================================== -->
<div id="signupScreen" class="screen">
    <div class="signup-container">
        <h2>신규 회원 가입</h2>
        <label>사용자명</label>
        <input id="regName" placeholder="아이디(사용자명) 입력">
        <label>이메일</label>
        <input id="regEmail" placeholder="이메일 주소 입력">
        <label>비밀번호</label>
        <input id="regPassword" type="password" placeholder="비밀번호 설정">

        <button class="signup-btn" onclick="registerUser()">가입 완료</button>
        <button class="cancel-btn" onclick="goToLogin()">취소 (로그인으로)</button>
    </div>
</div>

<!-- ==================================================
     3. 메인 서비스 및 미디어 컨트롤 화면 (Screen 3)
     ================================================== -->
<div id="mainScreen" class="screen">
    <!-- 로그인 유저 식별 표시 및 자발적 탈퇴 / 로그아웃 제어 인터페이스 -->
    <div class="auth-bar">
        <div>
            현재 로그인 사용자: <span style="color: blue; font-size: 1.1em;">[ <strong id="currentUserDisplay"></strong> ]</span>
        </div>
        <div>
            <!-- 로그인 사용자 본인의 권한을 스스로 영구 파기/탈퇴처리 시키는 액션 버튼임 -->
            <button onclick="withdrawSelf()" style="padding: 5px 15px; background-color: #dc3545; color: white; border: none; border-radius: 4px; margin-right: 5px;">회원 탈퇴</button>
            <button onclick="logout()" style="padding: 5px 15px;">로그아웃</button>
        </div>
    </div>

    <!-- 미디어 업로드 및 리스트 탐색/플레이 공간 -->
    <section>
        <h2>미디어 관리 및 스트리밍 (CRUD + Streaming)</h2>
        <div class="flex">
            <!-- 신규 미디어 멀티파트 폼 업로드 영역 (Create) -->
            <div style="flex: 1;">
                <h3>미디어 업로드 (Create)</h3>
                <input id="mediaTitle" placeholder="동영상 제목"><br>
                Type:
                <select id="mediaType">
                    <option value="VIDEO">VIDEO (비디오)</option>
                    <option value="AUDIO">AUDIO (오디오)</option>
                </select><br><br>
                <input type="file" id="mediaFile"><br><br>
                <button onclick="uploadMedia()" style="padding: 8px 20px; font-weight:bold;">업로드</button>
            </div>
            <!-- 수집된 미디어들의 실시간 목록화 및 선택 뷰어 재생 영역 (Read) -->
            <div style="flex: 1;">
                <h3>미디어 목록 및 플레이어</h3>
                <button onclick="loadMediaList()" style="padding: 5px 10px; margin-bottom: 10px;">목록 새로고침</button>
                <ul id="mediaList"></ul>

                <h4>플레이어</h4>
                <video id="videoPlayer" controls width="320" height="240" style="display:none;"></video>
                <br>
                <audio id="audioPlayer" controls style="display:none;"></audio>
            </div>
        </div>
    </section>

    <!-- [회원 데이터 다이렉트 디버깅 제어 패널 트리거] -->
    <div style="margin-top: 30px; text-align: right;">
        <button onclick="toggleDebugPanel()" style="font-size: 12px; background: none; border: 1px dashed red; color: red; padding: 5px;">
            [디버그용] 회원 전체 관리 패널 토글
        </button>
    </div>

    <!-- DB 유저 정보의 상태를 추적하고 직접 소멸/갱신하기 위한 비상 백오피스 영역임 -->
    <div id="debugPanel" class="debug-panel" style="display: none;">
        <h3 style="color: red; margin-top:0;">유저 정보 관리 (CRUD 백업)</h3>
        <div class="flex">
            <!-- 가입 유저 명칭 조회 및 폼 채우기 장치 (Read) -->
            <div>
                <h4>회원 조회 및 검증 (Read)</h4>
                <input id="searchName" placeholder="사용자명 검색">
                <button onclick="getUser()">조회</button>
                <p id="userInfo"></p>
            </div>
            <!-- 조회된 가입 데이터의 내용을 변경 및 수정(Update), 무력 강제탈퇴(Delete) 시키는 수단 -->
            <div>
                <h4>회원 정보 수정 (Update)</h4>
                <input id="updateId" placeholder="회원 ID" readonly style="background-color: #eee;">
                <input id="updateName" placeholder="새 사용자명">
                <input id="updateEmail" placeholder="새 이메일">
                <input id="updatePassword" type="password" placeholder="새 비밀번호">
                <button onclick="updateUser()">수정</button>
                <!-- 💡 관리자 "admin" 계정이 위임받아 타인을 강제 배출시키는 단추임 -->
                <button onclick="deleteUserByAdmin()" style="background-color: #dc3545; color: white; border: none; border-radius: 4px; padding: 5px 10px; margin-left: 5px;">관리자 권한으로 삭제</button>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * [글로벌 환경 변수 구성]
     * host: 백엔드 서버가 대기 중인 대상 포트 엔드포인트 도메인임.
     * loggedInUser: 현재 클라이언트 세션을 선점하여 지배 중인 유저의 사용자명임.
     * loggedInUserId: DB 내 해당 가입 주체의 고유 일련번호(PK)를 식별 및 캐싱해 두는 장소임.
     */
    const host = "http://localhost:8080";
    let loggedInUser = null;
    let loggedInUserId = null;

    /**
     * [동적 뷰 스크린 전환 알고리즘]
     * 화면 상의 불필요한 단락(screen 클래스)들을 전부 숨긴 후, 목표 요소 하나만 골라 블록 활성화함.
     *
     * @param {string} screenId 시현을 원하는 HTML 노드의 고유 아이디임.
     */
    function showScreen(screenId) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('signupScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'none';

        document.getElementById(screenId).style.display = 'block';
    }

    /** [가입 화면으로 전환] */
    function goToSignup() {
        showScreen('signupScreen');
    }

    /** [로그인 화면으로 전환] */
    function goToLogin() {
        showScreen('loginScreen');
    }

    /** [디버그 전용 백오피스 보조 판넬 숨김/시현 토글] */
    function toggleDebugPanel() {
        const panel = document.getElementById('debugPanel');
        panel.style.display = (panel.style.display === 'none') ? 'block' : 'none';
    }

    // 문서가 처음 브라우저에 로드될 때 로그인 화면을 기본 뷰로 지정함.
    showScreen('loginScreen');

    /**
     * [인증 확인 및 사용자 진입 검사 함수]
     * 관리자 'admin' 계정의 우회 접근 처리 및 일반 회원 일치 여부를 비동기 REST API 호출을 통해 판단함.
     */
    async function login() {
        const username = document.getElementById('loginName').value;
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            alert("사용자명과 비밀번호를 모두 입력해 주세요.");
            return;
        }

        // [행동 규칙 가드] 관리자 admin 검진 시 백엔드 조회 생략 후 가상 식별자로 우회 연산함.
        if (username === "admin" && password === "admin") {
            loggedInUser = "admin";
            loggedInUserId = 0;
            loginSuccess();
            alert("관리자(admin) 권한으로 로그인 되었습니다.");
            return;
        }

        try {
            const res = await fetch(`${host}/api/users/${username}`);
            if (res.ok) {
                const user = await res.json();
                // [인증 검사 알고리즘] 받아온 비밀번호 데이터가 유저 입력값과 정밀 매칭하는지 확인정리함.
                if (user.password === password) {
                    loggedInUser = user.username;
                    loggedInUserId = user.id;
                    loginSuccess();
                    alert(`${loggedInUser}님 환영합니다!`);
                } else {
                    alert("비밀번호가 일치하지 않습니다.");
                }
            } else {
                alert("존재하지 않는 사용자명입니다.");
            }
        } catch (e) {
            alert("서버 연결에 실패하였음. 연결 포트를 검사할 것.");
        }
    }

    /**
     * [로그인 인가 확정 이후 화면 정리]
     * 상단 유저 정보 UI 갱신 및 입력 필드를 클리어하고 메인 보드를 시현함.
     */
    function loginSuccess() {
        document.getElementById('currentUserDisplay').innerText = loggedInUser;

        document.getElementById('loginName').value = "";
        document.getElementById('loginPassword').value = "";

        showScreen('mainScreen');
        loadMediaList();
    }

    /**
     * [현재 사용자 상태 해제 및 세션 로그아웃 소멸]
     * 유저 바인딩 캐시를 null로 폐기하고 재생 중인 비디오/오디오 소스를 정지시킨 후 복구시킴.
     */
    function logout() {
        loggedInUser = null;
        loggedInUserId = null;

        const videoPlayer = document.getElementById('videoPlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        videoPlayer.pause();
        audioPlayer.pause();
        videoPlayer.style.display = "none";
        audioPlayer.style.display = "none";

        alert("로그아웃 되었습니다.");
        showScreen('loginScreen');
    }

    /**
     * [개발 편의용 비밀번호 도구 힌트 유출 조회]
     * 가입 유저명을 기반으로 실시간 조회된 원 장치 정보를 비밀번호 팝업으로 사용자에게 보여줌.
     */
    async function getPasswordHint() {
        const username = document.getElementById('hintName').value;
        if (!username) {
            alert("비밀번호를 조회할 사용자명을 입력해 주세요.");
            return;
        }
        const res = await fetch(`${host}/api/users/${username}`);
        if (res.ok) {
            const user = await res.json();
            alert(`[디버깅 힌트] ${username}님의 비밀번호는 "${user.password}" 입니다.`);
        } else {
            alert("존재하지 않는 회원입니다.");
        }
    }

    /**
     * [신규 회원 가입 전송 처리 (Create)]
     * 사용자명, 이메일, 패스워드 미비사항을 정밀 검사한 뒤 가입 REST API(POST)를 호출함.
     */
    async function registerUser() {
        const username = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;

        if (!username || !email || !password) {
            alert("사용자명, 이메일, 비밀번호를 모두 입력해주세요.");
            return;
        }

        const res = await fetch(`${host}/api/users/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        if (res.ok) {
            alert("가입 성공! 로그인 화면으로 돌아갑니다.");
            document.getElementById('regName').value = "";
            document.getElementById('regEmail').value = "";
            document.getElementById('regPassword').value = "";
            showScreen('loginScreen');
        } else {
            alert("가입 처리에 실패했습니다. (중복 사용자명 확인)");
        }
    }

    /**
     * [회원 특정 탐색 기능 (Read - 디버그용)]
     * 입력 키워드를 이용하여 특정 사용자를 색인해 수집한 뒤, 편집 패널 데이터 입력 칸에 바인딩함.
     */
    async function getUser() {
        const username = document.getElementById('searchName').value;
        const res = await fetch(`${host}/api/users/${username}`);
        const infoText = document.getElementById('userInfo');

        if (res.ok) {
            const user = await res.json();
            infoText.innerText = `ID: ${user.id} / Name: ${user.username} / Email: ${user.email}`;

            document.getElementById('updateId').value = user.id;
            document.getElementById('updateName').value = user.username;
            document.getElementById('updateEmail').value = user.email;
            document.getElementById('updatePassword').value = user.password;
        } else {
            infoText.innerText = "사용자를 찾을 수 없습니다.";
            document.getElementById('updateId').value = "";
            document.getElementById('updateName').value = "";
            document.getElementById('updateEmail').value = "";
            document.getElementById('updatePassword').value = "";
        }
    }

    /**
     * [가입 회원 데이터 강제 갱신 개명 (Update - 디버그용)]
     * 수집 변경된 폼 정보들의 무결성을 확인한 후 PUT API를 통해 대상 원장 데이터를 개작함.
     */
    async function updateUser() {
        const id = document.getElementById('updateId').value;
        const username = document.getElementById('updateName').value;
        const email = document.getElementById('updateEmail').value;
        const password = document.getElementById('updatePassword').value;

        if (!id) {
            alert("수정할 회원의 ID가 필요합니다. 회원을 먼저 조회해 주세요!");
            return;
        }
        if (!username || !email || !password) {
            alert("수정할 모든 정보를 입력해 주세요.");
            return;
        }

        const res = await fetch(`${host}/api/users/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        if (res.ok) {
            alert("회원 정보 수정 성공!");
            document.getElementById('searchName').value = username;
            getUser();
        } else {
            alert("회원 정보 수정 실패!");
        }
    }

    /**
     * [당사자 직접 탈퇴/소멸 수행 (Delete - 본인 처리)]
     * 본인확인 재인증을 통과한 후 백엔드에 회원 탈퇴 처리를 요청하여 영구 삭제를 진행함.
     */
    async function withdrawSelf() {
        if (!loggedInUser) {
            alert("로그인 정보가 없습니다.");
            return;
        }
        if (loggedInUser === "admin") {
            alert("관리자 계정은 이 버튼으로 탈퇴할 수 없습니다.");
            return;
        }

        if (confirm("정말 회원 탈퇴를 진행하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) {
            const res = await fetch(`${host}/api/users/${loggedInUserId}?username=${loggedInUser}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                alert("탈퇴 처리가 정상적으로 완료되었습니다. 이용해 주셔서 감사합니다.");
                loggedInUser = null;
                loggedInUserId = null;
                showScreen('loginScreen');
            } else {
                alert("탈퇴 처리 중 오류가 발생했습니다.");
            }
        }
    }

    /**
     * [관리자 강제 사법 권한 탈퇴 (Delete - admin 전용)]
     * 관리자 'admin' 세션 권한을 탐색 확인한 후 권한 인가를 동반해 임의의 타 유저를 추방 처리함.
     */
    async function deleteUserByAdmin() {
        if (loggedInUser !== "admin") {
            alert("관리자(admin) 계정만 사용자를 강제로 삭제할 수 있습니다.");
            return;
        }

        const targetId = document.getElementById('updateId').value;
        const targetName = document.getElementById('updateName').value;

        if (!targetId) {
            alert("삭제할 회원의 ID가 필요합니다. 회원을 먼저 조회해 주세요!");
            return;
        }

        if (confirm(`정말 관리자 권한으로 [${targetName}] 회원을 강제 삭제하시겠습니까?`)) {
            const res = await fetch(`${host}/api/users/${targetId}?username=${loggedInUser}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                alert(`[${targetName}] 회원이 성공적으로 강제 탈퇴되었습니다.`);
                document.getElementById('searchName').value = "";
                document.getElementById('userInfo').innerText = "";
                document.getElementById('updateId').value = "";
                document.getElementById('updateName').value = "";
                document.getElementById('updateEmail').value = "";
                document.getElementById('updatePassword').value = "";
            } else if (res.status === 403) {
                alert("삭제 권한이 없습니다.");
            } else {
                alert("삭제 처리에 실패했습니다.");
            }
        }
    }

    /**
     * [멀티파트 바이너리 파일 업로드 수립 (Create)]
     * 업로드 폼에 기입된 미디어 자원을 FormData 개체에 탑재시켜 비동기 멀티파트 전송을 완수함.
     */
    async function uploadMedia() {
        if (!loggedInUser) {
            alert("업로드 작업을 진행하려면 로그인이 필요합니다.");
            return;
        }

        const title = document.getElementById('mediaTitle').value;
        const type = document.getElementById('mediaType').value;
        const fileInput = document.getElementById('mediaFile');

        if (!title || !fileInput.files[0]) {
            alert("제목과 파일을 모두 입력해 주세요.");
            return;
        }

        // 브라우저 네이티브 FormData API를 이용해 인코딩을 수행함
        const formData = new FormData();
        formData.append("title", title);
        formData.append("type", type);
        formData.append("file", fileInput.files[0]);
        formData.append("uploader", loggedInUser);

        const res = await fetch(`${host}/api/media/upload`, {
            method: 'POST',
            body: formData // Content-Type 헤더는 브라우저가 boundary 값을 포함하여 자동 빌드함
        });

        if (res.ok) {
            alert("업로드 성공!");
            document.getElementById('mediaTitle').value = "";
            fileInput.value = "";
            loadMediaList();
        } else if (res.status === 409) {
            // 중복된 영상 타이틀 등록 거절 응답을 처리함
            const errorResult = await res.json();
            alert(errorResult.message);
        } else {
            alert("업로드 실패!");
        }
    }

    /**
     * [보유 중인 미디어 파일 메타데이터 목록 갱신 (Read)]
     * 데이터베이스에 기록된 미디어 파일 리스트 전체를 읽어들여 DOM 구조를 동적으로 갱신 출력함.
     */
    async function loadMediaList() {
        const res = await fetch(`${host}/api/media`);
        const list = await res.json();
        const listEl = document.getElementById('mediaList');
        listEl.innerHTML = "";

        list.forEach(m => {
            const li = document.createElement('li');
            li.style.marginGap = "5px";
            li.style.marginBottom = "5px";

            // 재생, 자격 부여 이름 개작(Edit), 미디어 완전 소각(Delete) 함수 연결 단추 생성 구조 정의
            li.innerHTML = `
                [${m.fileType}] <strong id="title-text-${m.id}">${m.title}</strong>
                <span style="font-size: 0.85em; color: gray;">(업로더: ${m.uploadedBy})</span>
                <button onclick="playMedia(${m.id}, '${m.fileType}')">재생</button>
                <button onclick="editMediaTitle(${m.id}, '${m.title}')">이름 수정</button>
                <button onclick="deleteMedia(${m.id})">삭제</button>
            `;
            listEl.appendChild(li);
        });
    }

    /**
     * [미디어 타이틀 임의 수정 변경 (Update)]
     * 사용자로부터 개명할 새로운 스트링을 확보한 뒤 변경 요청 인가 처리를 호출함.
     *
     * @param {number} id 변경할 타겟 미디어 메타 DB 인덱스 값임.
     * @param {string} currentTitle 기존의 타이틀 정보임.
     */
    async function editMediaTitle(id, currentTitle) {
        if (!loggedInUser) {
            alert("수정 작업을 진행하려면 로그인이 필요합니다.");
            return;
        }

        const newTitle = prompt("변경하고자 하는 새로운 동영상 제목을 입력하세요:", currentTitle);
        if (newTitle === null) return;

        const trimmedTitle = newTitle.trim();
        if (trimmedTitle === "") {
            alert("공백 제목으로는 수정할 수 없습니다.");
            return;
        }

        const res = await fetch(`${host}/api/media/${id}?title=${encodeURIComponent(trimmedTitle)}&username=${loggedInUser}`, {
            method: 'PUT'
        });

        if (res.ok) {
            alert("동영상 제목이 변경되었습니다.");
            loadMediaList();
        } else if (res.status === 403) {
            alert("수정 권한이 없습니다. (본인이 올린 동영상이거나 admin 계정만 수정 가능합니다)");
        } else {
            alert("동영상 제목 수정에 실패했습니다.");
        }
    }

    /**
     * [특정 미디어 영구 말소 (Delete)]
     * 관리자 혹은 본인이 직접 파일 정보 및 디스크 리소스를 삭제할 수 있도록 소거 과정을 진행함.
     *
     * @param {number} id 파괴 대상 미디어 메타 데이터 식별키임.
     */
    async function deleteMedia(id) {
        if (!loggedInUser) {
            alert("삭제 작업을 진행하려면 로그인이 필요합니다.");
            return;
        }

        if (confirm("정말 이 미디어를 삭제하시겠습니까?")) {
            const res = await fetch(`${host}/api/media/${id}?username=${loggedInUser}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                alert("성공적으로 삭제되었습니다.");
                loadMediaList();
            } else if (res.status === 403) {
                alert("삭제 권한이 거부되었습니다. (본인이 업로드한 미디어이거나 admin 계정이어야 합니다)");
            } else {
                alert("미디어 삭제 처리에 실패하였습니다.");
            }
        }
    }

    /**
     * [미디어 파일 다이렉트 스트리밍 재생 중개 (Stream)]
     * 타겟 미디어 타입(VIDEO | AUDIO)에 준하는 HTML 네이티브 컴포넌트 플레이어를 활성화해 재생을 지원함.
     *
     * @param {number} id 재생할 자원 식별 인덱스임.
     * @param {string} type 자원 유형을 표기함.
     */
    function playMedia(id, type) {
        const videoPlayer = document.getElementById('videoPlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        const streamUrl = `${host}/api/media/stream/${id}`;

        if (type === "VIDEO") {
            // 다른 사운드 재생 트랙 오버랩 간섭 배제
            audioPlayer.style.display = "none";
            audioPlayer.pause();

            videoPlayer.src = streamUrl;
            videoPlayer.style.display = "block";
            videoPlayer.play();
        } else {
            // 다른 비디오 재생 트랙 오버랩 간섭 배제
            videoPlayer.style.display = "none";
            videoPlayer.pause();

            audioPlayer.src = streamUrl;
            audioPlayer.style.display = "block";
            audioPlayer.play();
        }
    }
</script>
</body>
</html>
